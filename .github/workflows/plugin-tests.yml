name: Plugin tests

on:
  push:
    branches: [ 'feat/hal-plugin-registry', 'feat/hal-plugin-loader-impl' ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest
      - name: Run plugin tests
        run: |
          pytest -q tests/test_plugin_loader_registry_integration.py tests/test_hal_plugin_loader_lifecycle.py tests/test_hal_plugin_loader_impl.py
